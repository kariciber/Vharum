<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Vharum</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; background:#05050a; overflow:hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    canvas { display:block; width:100vw; height:100vh; }

    #ui { position: fixed; left: 10px; top: 10px; right: 10px; display:flex; gap:10px; flex-wrap:wrap; z-index:10; }
    .pill {
      padding:8px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.06);
      color:#f2f2ff; font-size:13px;
      backdrop-filter: blur(6px);
    }

    #msg {
      position: fixed; left:10px; right:10px; top:58px;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(0,0,0,.55);
      color:#fff; font-size:14px; line-height:1.35;
      z-index:10; display:none; white-space:pre-line;
    }

    #touch {
      position: fixed; left: 10px; right: 10px; bottom: 10px;
      display:grid; grid-template-columns:auto 1fr; gap:12px;
      z-index:10; pointer-events:none;
    }
    .dpad,.actions{ pointer-events:auto; }
    .dpad{ display:grid; grid-template-columns:56px 56px 56px; grid-template-rows:56px 56px 56px; gap:10px; }
    .btn{
      width:56px; height:56px; border-radius:16px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:#fff; font-weight:800; font-size:16px;
      user-select:none; -webkit-tap-highlight-color: transparent;
    }
    .btn:active{ transform: translateY(1px); }
    .empty{ visibility:hidden; }
    .actions{ display:flex; gap:10px; align-items:end; justify-content:end; }
    .wide{ width:auto; padding:0 14px; }
  </style>
</head>
<body>

  <div id="ui">
    <div class="pill" id="scenePill">Escena: ...</div>
    <div class="pill" id="statusPill">Cargando...</div>
    <div class="pill" id="hintPill">WASD/Flechas · E interactuar</div>
  </div>

  <div id="msg"></div>
  <canvas id="c"></canvas>

  <div id="touch">
    <div class="dpad">
      <div class="empty btn"></div>
      <button class="btn" data-hold="up">↑</button>
      <div class="empty btn"></div>

      <button class="btn" data-hold="left">←</button>
      <button class="btn" data-hold="down">↓</button>
      <button class="btn" data-hold="right">→</button>

      <div class="empty btn"></div>
      <div class="empty btn"></div>
      <div class="empty btn"></div>
    </div>

    <div class="actions">
      <button class="btn wide" id="btnE">E · Interactuar</button>
      <button class="btn wide" id="btnReload">Recargar</button>
    </div>
  </div>

<script>
(() => {
  // ✅ BASE correcta para tu repo y carpeta /assets/
  const BASE = "https://raw.githubusercontent.com/kariciber/Vharum/main/assets/";

  // ✅ Tus nombres EXACTOS
  const FILES = {
    pasillo_oscuro: "pasillooscuro.png",
    pasillo_luz: "pasilloluz.png",
    tres_oscuro: "trespuertasoscuras.png",
    tres_luz: "trespuertasluz.png",
    player: "jugadorsombra.png"
  };

  // UI
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const scenePill = document.getElementById("scenePill");
  const statusPill = document.getElementById("statusPill");
  const hintPill = document.getElementById("hintPill");
  const msgBox = document.getElementById("msg");

  function showMsg(text, ms=1600){
    msgBox.textContent = text;
    msgBox.style.display = "block";
    if (ms) setTimeout(() => msgBox.style.display = "none", ms);
  }

  // Canvas resize nítido
  function resize(){
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  addEventListener("resize", resize);
  resize();

  // Loader
  function loadImage(url){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("No se pudo cargar: " + url));
      img.src = url;
    });
  }

  async function preload(){
    const out = {};
    const entries = Object.entries(FILES);
    for (let i=0; i<entries.length; i++){
      const [k, file] = entries[i];
      const url = BASE + file;
      statusPill.textContent = `Cargando ${i+1}/${entries.length}…`;
      out[k] = await loadImage(url);
    }
    statusPill.textContent = "Listo ✅";
    return out;
  }

  // Scenes (pasillo ↔ tres puertas)
  const SCENES = {
    pasillo: {
      name: "pasillo",
      // en pasillo usaremos parpadeo entre oscuro y luz
      door: { x: 0.78, y: 0.52, w: 0.14, h: 0.32 },
      next: "tres"
    },
    tres: {
      name: "tres puertas",
      // parpadeo entre tres_oscuro y tres_luz
      door: { x: 0.06, y: 0.55, w: 0.16, h: 0.30 },
      next: "pasillo"
    }
  };

  let images = null;
  let sceneKey = "pasillo";

  function setScene(k){
    sceneKey = k;
    scenePill.textContent = "Escena: " + SCENES[k].name;
    showMsg("Entraste en: " + SCENES[k].name, 900);
    scheduleFlicker(performance.now());
  }

  // Flicker (parpadeo)
  let flickerOn = false;
  let nextFlickerAt = 0;

  function scheduleFlicker(now){
    // Base irregular
    nextFlickerAt = now + (700 + Math.random() * 1800);
    flickerOn = false;
  }

  function updateFlicker(now){
    if (now < nextFlickerAt) return;

    // alterna con flashes cortos
    flickerOn = !flickerOn;

    if (flickerOn) {
      nextFlickerAt = now + (80 + Math.random() * 220);     // luz breve
    } else {
      nextFlickerAt = now + (700 + Math.random() * 1800);   // pausa
    }
  }

  // Player (más grande)
  const player = { x: 0.28, y: 0.82, speed: 0.007 };
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function playerRect(w,h){
    // 👇 AUMENTADO para que no se vea chiquito
    const pw = w * 0.17;
    const ph = h * 0.32;
    return { x: player.x*w - pw/2, y: player.y*h - ph, w: pw, h: ph };
  }
  function doorRect(w,h){
    const d = SCENES[sceneKey].door;
    return { x: d.x*w, y: d.y*h, w: d.w*w, h: d.h*h };
  }
  function intersects(a,b){
    return !(a.x+a.w < b.x || a.x > b.x+b.w || a.y+a.h < b.y || a.y > b.y+b.h);
  }

  // Input
  const keys = { up:false, down:false, left:false, right:false };

  addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "w" || e.key === "ArrowUp") keys.up = true;
    if (k === "s" || e.key === "ArrowDown") keys.down = true;
    if (k === "a" || e.key === "ArrowLeft") keys.left = true;
    if (k === "d" || e.key === "ArrowRight") keys.right = true;
    if (k === "e") interact();
  });

  addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    if (k === "w" || e.key === "ArrowUp") keys.up = false;
    if (k === "s" || e.key === "ArrowDown") keys.down = false;
    if (k === "a" || e.key === "ArrowLeft") keys.left = false;
    if (k === "d" || e.key === "ArrowRight") keys.right = false;
  });

  function bindHold(btn, dir){
    const on = (ev) => { ev.preventDefault(); keys[dir] = true; };
    const off = (ev) => { ev.preventDefault(); keys[dir] = false; };
    btn.addEventListener("pointerdown", on);
    btn.addEventListener("pointerup", off);
    btn.addEventListener("pointercancel", off);
    btn.addEventListener("pointerleave", off);
  }
  document.querySelectorAll("[data-hold]").forEach(b => bindHold(b, b.dataset.hold));

  document.getElementById("btnE").addEventListener("click", interact);
  document.getElementById("btnReload").addEventListener("click", () => location.reload());

  function interact(){
    const w = innerWidth, h = innerHeight;
    const pr = playerRect(w,h);
    const dr = doorRect(w,h);
    if (intersects(pr, dr)) {
      setScene(SCENES[sceneKey].next);
    } else {
      showMsg("Acércate a la puerta y pulsa E 🙂", 1200);
    }
  }

  // Render helpers
  function drawCover(img, w, h){
    const s = Math.max(w / img.width, h / img.height);
    const dw = img.width * s;
    const dh = img.height * s;
    ctx.drawImage(img, (w - dw)/2, (h - dh)/2, dw, dh);
  }

  let last = performance.now();

  function update(dt){
    const vx = (keys.right?1:0) - (keys.left?1:0);
    const vy = (keys.down?1:0) - (keys.up?1:0);
    const mag = Math.hypot(vx, vy) || 1;

    player.x += (vx/mag) * player.speed * dt;
    player.y += (vy/mag) * player.speed * dt;

    player.x = clamp(player.x, 0.08, 0.92);
    player.y = clamp(player.y, 0.40, 0.92);
  }

  function draw(now){
    const w = innerWidth, h = innerHeight;
    ctx.clearRect(0,0,w,h);

    // Fondo según escena + parpadeo
    let bg;
    if (sceneKey === "pasillo") {
      bg = flickerOn ? images.pasillo_luz : images.pasillo_oscuro;
    } else {
      bg = flickerOn ? images.tres_luz : images.tres_oscuro;
    }
    drawCover(bg, w, h);

    // Puerta hotspot (debug suave)
    const dr = doorRect(w,h);
    ctx.save();
    ctx.globalAlpha = 0.10;
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(dr.x, dr.y, dr.w, dr.h);
    ctx.restore();

    // Jugador
    const pr = playerRect(w,h);

    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.ellipse(pr.x + pr.w/2, pr.y + pr.h*0.95, pr.w*0.26, pr.h*0.08, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    ctx.drawImage(images.player, pr.x, pr.y, pr.w, pr.h);

    // Hint
    if (intersects(pr, dr)) hintPill.textContent = "Cerca de puerta: pulsa E";
    else hintPill.textContent = "WASD/Flechas · E interactuar";
  }

  function loop(now){
    const dt = Math.min(32, now - last);
    last = now;

    update(dt);
    updateFlicker(now);
    draw(now);

    requestAnimationFrame(loop);
  }

  // Start
  (async function start(){
    try{
      images = await preload();
      setScene("pasillo");
      requestAnimationFrame(loop);
    } catch (err){
      console.error(err);
      statusPill.textContent = "Error ❌";
      showMsg(
        "No se han podido cargar las imágenes.\n" +
        "Revisa nombres EXACTOS en /assets/.\n\n" +
        "Ejemplo:\n" + BASE + FILES.player,
        0
      );
    }
  })();

})();
</script>
</body>
</html>
