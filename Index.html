<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vharum</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #msg {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      padding: 10px;
      background: rgba(0,0,0,.6);
      color: white;
      font-family: system-ui;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.2);
    }
  </style>
</head>
<body>

<div id="msg">Cargando imágenes...</div>
<canvas id="c"></canvas>

<script>
(async () => {

  // ✅ TU RUTA REAL
  const BASE = "https://raw.githubusercontent.com/kariciber/Vharum/main/assets/";

  const FILES = {
    bg: BASE + "pasillooscuro.png",
    player: BASE + "jugadorsombra.png"
  };

  const msg = document.getElementById("msg");
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  window.addEventListener("resize", resize);
  resize();

  function load(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = () => reject(url);
      img.src = url;
    });
  }

  let bg, player;

  try {
    bg = await load(FILES.bg);
    player = await load(FILES.player);
    msg.textContent = "Listo ✅ (usa WASD / Flechas)";
  } catch (badUrl) {
    console.error("Error cargando:", badUrl);
    msg.textContent = "Error cargando imagen ❌ Mira consola";
    return;
  }

  const keys = {};
  window.addEventListener("keydown", e => keys[e.key] = true);
  window.addEventListener("keyup", e => keys[e.key] = false);

  let x = canvas.width * 0.3;
  let y = canvas.height * 0.8;
  const speed = 3;

  function drawBackground() {
    const scale = Math.max(
      canvas.width / bg.width,
      canvas.height / bg.height
    );

    const w = bg.width * scale;
    const h = bg.height * scale;

    ctx.drawImage(bg,
      (canvas.width - w) / 2,
      (canvas.height - h) / 2,
      w,
      h
    );
  }

  function loop() {

    if (keys["ArrowLeft"] || keys["a"]) x -= speed;
    if (keys["ArrowRight"] || keys["d"]) x += speed;
    if (keys["ArrowUp"] || keys["w"]) y -= speed;
    if (keys["ArrowDown"] || keys["s"]) y += speed;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBackground();

    const pw = canvas.width * 0.12;
    const ph = canvas.height * 0.22;

    ctx.drawImage(player, x - pw/2, y - ph, pw, ph);

    requestAnimationFrame(loop);
  }

  loop();

})();
</script>

</body>
</html>
