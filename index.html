<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vharum</title>

<style>
body{margin:0;background:black;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#msg{
position:fixed;top:10px;left:10px;right:10px;
padding:10px 12px;background:rgba(0,0,0,.6);
color:white;font-family:system-ui;
border-radius:10px;border:1px solid rgba(255,255,255,.2);
z-index:10
}
</style>
</head>
<body>

<div id="msg">Cargando...</div>
<canvas id="c"></canvas>

<script>
(async()=>{

// ✅ RUTAS RELATIVAS (FUNCIONA EN GITHUB PAGES)
const FILES={
bgDark:"assets/pasillooscuro.png",
bgLight:"assets/pasilloluz.png",
player:"assets/jugadorsombra.png"
};

const msg=document.getElementById("msg");
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
const dpr=Math.max(1,Math.min(2,devicePixelRatio||1));
canvas.width=Math.floor(innerWidth*dpr);
canvas.height=Math.floor(innerHeight*dpr);
ctx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener("resize",resize);
resize();

function load(url){
return new Promise((resolve,reject)=>{
const img=new Image();
img.onload=()=>resolve(img);
img.onerror=()=>reject(url);
img.src=url;
});
}

let bgDark,bgLight,player;

try{
[bgDark,bgLight,player]=await Promise.all([
load(FILES.bgDark),
load(FILES.bgLight),
load(FILES.player)
]);
msg.textContent="Listo ✅ (WASD / Flechas)";
}catch(e){
console.error("Error cargando:",e);
msg.textContent="Error cargando imágenes ❌";
return;
}

const keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

let x=innerWidth*0.5;
let y=innerHeight*0.88;
const speed=3.2;

// Parpadeo
let useLight=false;
let nextF=performance.now()+900;

function schedule(now){
nextF=now+(700+Math.random()*1800);
}

function flicker(now){
if(now<nextF)return;
useLight=!useLight;
if(useLight)nextF=now+(80+Math.random()*220);
else schedule(now);
}

function drawCover(img){
const w=innerWidth,h=innerHeight;
const s=Math.max(w/img.width,h/img.height);
const dw=img.width*s,dh=img.height*s;
ctx.drawImage(img,(w-dw)/2,(h-dh)/2,dw,dh);
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

schedule(performance.now());

function loop(now){

flicker(now);

if(keys["ArrowLeft"]||keys["a"]||keys["A"])x-=speed;
if(keys["ArrowRight"]||keys["d"]||keys["D"])x+=speed;
if(keys["ArrowUp"]||keys["w"]||keys["W"])y-=speed;
if(keys["ArrowDown"]||keys["s"]||keys["S"])y+=speed;

x=clamp(x,innerWidth*0.05,innerWidth*0.95);
y=clamp(y,innerHeight*0.45,innerHeight*0.95);

ctx.clearRect(0,0,innerWidth,innerHeight);
drawCover(useLight?bgLight:bgDark);

const pw=innerWidth*0.20;
const ph=innerHeight*0.38;

// sombra
ctx.save();
ctx.globalAlpha=0.28;
ctx.fillStyle="black";
ctx.beginPath();
ctx.ellipse(x,y,pw*0.30,ph*0.08,0,0,Math.PI*2);
ctx.fill();
ctx.restore();

ctx.drawImage(player,x-pw/2,y-ph,pw,ph);

requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

})();
</script>

</body>
</html>
