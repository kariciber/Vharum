<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vharum</title>

<style>
  body {
    margin:0;
    background:black;
    overflow:hidden;
    font-family: system-ui, sans-serif;
  }

  canvas {
    display:block;
    width:100vw;
    height:100vh;
  }

  #msg {
    position:fixed;
    top:10px; left:10px; right:10px;
    padding:10px 12px;
    background:rgba(0,0,0,0.55);
    color:white;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.2);
    pointer-events:none;
  }

  /* Pantalla de inicio */
  #startScreen {
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
  }

  #startTitle {
    font-size:48px;
    margin-bottom:20px;
    letter-spacing:4px;
  }

  #startBtn {
    padding:12px 24px;
    background:white;
    color:black;
    border:none;
    border-radius:6px;
    font-size:20px;
    cursor:pointer;
  }

  #startScreen.fadeOut {
    transition: opacity 0.8s ease;
    opacity:0;
    pointer-events:none;
  }
</style>
</head>

<body>

<div id="startScreen">
  <div id="startTitle">VHARUM</div>
  <button id="startBtn">Iniciar</button>
</div>

<div id="msg">Cargando imágenes...</div>
<canvas id="c"></canvas>

<script>
(async () => {

  // --- Archivos ---
  const FILES = {
    bgDark: "assets/pasillooscuro.png",
    bgLight: "assets/pasilloluz.png"
    // PLAYER ELIMINADO → primera persona
  };

  const startScreen = document.getElementById("startScreen");
  const startBtn = document.getElementById("startBtn");
  const msg = document.getElementById("msg");
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio||1));
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener("resize", resize);
  resize();

  function load(url) {
    return new Promise((resolve, reject)=>{
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.onerror = ()=>reject(url);
      img.src = url;
    });
  }

  let bgDark, bgLight;
  try{
    [bgDark, bgLight] = await Promise.all([
      load(FILES.bgDark),
      load(FILES.bgLight)
    ]);
    msg.textContent = "Listo — WASD / Flechas";
  } catch(err){
    msg.textContent = "❌ Error al cargar imágenes";
    return;
  }

  const keys = {};
  addEventListener("keydown", e => keys[e.key] = true);
  addEventListener("keyup",   e => keys[e.key] = false);

  // --- "Posición de la cámara" (primera persona) ---
  let x = innerWidth * 0.5;
  let y = innerHeight * 0.75;
  const speed = 3;

  // --- Parpadeo ---
  let useLight = false;
  let nextF = performance.now() + 800;
  function schedule(t){ nextF = t + (700 + Math.random()*1800); }
  function blink(t){
    if(t < nextF) return;
    useLight = !useLight;
    if(useLight) nextF = t + (80 + Math.random()*220);
    else schedule(t);
  }

  function drawCover(img){
    const w = innerWidth, h = innerHeight;
    const s = Math.max(w/img.width, h/img.height);
    const dw = img.width*s, dh = img.height*s;
    ctx.drawImage(img, (w-dw)/2, (h-dh)/2, dw, dh);
  }

  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  // --- Loop ---
  let running = false;

  function loop(t){
    if(!running) return;

    blink(t);

    if(keys["a"]||keys["A"]||keys["ArrowLeft"])  x -= speed;
    if(keys["d"]||keys["D"]||keys["ArrowRight"]) x += speed;
    if(keys["w"]||keys["W"]||keys["ArrowUp"])    y -= speed;
    if(keys["s"]||keys["S"]||keys["ArrowDown"])  y += speed;

    x = clamp(x, innerWidth*0.05, innerWidth*0.95);
    y = clamp(y, innerHeight*0.35, innerHeight*0.95);

    ctx.clearRect(0,0,innerWidth,innerHeight);
    drawCover(useLight ? bgLight : bgDark);

    // sin sprite del jugador → primera persona

    requestAnimationFrame(loop);
  }

  // --- Inicio del juego ---
  startBtn.onclick = ()=>{
    startScreen.classList.add("fadeOut");
    running = true;
    requestAnimationFrame(loop);
  };

})();
</script>

</body>
</html>
