<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vharum</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: system-ui, sans-serif;
    color: white;
  }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: calc(100vh - 60px);
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  #controls button {
    background: white;
    color: black;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }

  #msg {
    position: fixed;
    top: 10px;
    left: 10px;
    right: 10px;
    padding: 10px 12px;
    background: rgba(0,0,0,0.55);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    pointer-events: none;
  }

  #startScreen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  #startTitle {
    font-size: 48px;
    margin-bottom: 20px;
    letter-spacing: 4px;
  }

  #startBtn {
    padding: 12px 24px;
    background: white;
    color: black;
    border: none;
    border-radius: 6px;
    font-size: 20px;
    cursor: pointer;
  }

  #startScreen.fadeOut {
    transition: opacity 0.8s ease;
    opacity: 0;
    pointer-events: none;
  }

  #fade {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
</style>
</head>
<body>

<div id="startScreen">
  <div id="startTitle">VHARUM - Nivel 1</div>
  <button id="startBtn">Iniciar</button>
</div>

<div id="msg">Cargando imágenes...</div>

<div id="gameContainer">
  <canvas id="c"></canvas>
</div>

<div id="controls">
  <button id="btnMenu">Menú</button>
  <button id="btnHelp">Ayuda</button>
  <button id="btnExit">Salir</button>
</div>

<div id="fade"></div>

<script>
(async () => {

  const FILES = {
    bgDark: "assets/pasillooscuro.png",
    bgLight: "assets/pasilloluz.png",
    threeDoorsDark: "assets/trespuertasoscuras.png",
    threeDoorsLight: "assets/trespuertasluz.png",
    doorOpen: "assets/habitacioncontunel.png",
    ascensorOpen: "assets/ascensorabiertoplanta2.png",
    ascensorLight: "assets/ascensorabiertoplanta2luz.png",
    planta2: "assets/planta2.png"
  };

  const startScreen = document.getElementById("startScreen");
  const startBtn = document.getElementById("startBtn");
  const msg = document.getElementById("msg");
  const fade = document.getElementById("fade");
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(canvas.clientWidth * dpr);
    canvas.height = Math.floor(canvas.clientHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  addEventListener("resize", resize);
  resize();

  function load(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        console.log("✔ cargado:", url);
        resolve(img);
      };
      img.onerror = () => {
        console.error("❌ error:", url);
        reject(url);
      };
      img.src = url;
    });
  }

  let images = {};
  try {
    const entries = Object.entries(FILES);
    const loaded = await Promise.all(entries.map(([k, v]) => load(v)));
    entries.forEach(([k], i) => images[k] = loaded[i]);
    msg.textContent = "Listo - WASD / Flechas, E para interactuar";
  } catch (err) {
    msg.textContent = "❌ Error cargando: " + err;

    ctx.fillStyle = "darkred";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText("ERROR:", 20, 40);
    ctx.fillText(err, 20, 70);
    return;
  }

  const keys = {};
  addEventListener("keydown", e => keys[e.key] = true);
  addEventListener("keyup", e => keys[e.key] = false);

  let z = 1, maxZ = 2.2, minZ = 1;
  let scene = 1;
  let interacting = false, running = false;

  let useLight = false, nextF = performance.now() + 800;

  function schedule(t) {
    nextF = t + (700 + Math.random() * 1800);
  }

  function blink(t) {
    if (t < nextF) return;
    useLight = !useLight;
    if (useLight) nextF = t + (80 + Math.random() * 220);
    else schedule(t);
  }

  function drawImageScaled(img, zoom) {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const s = Math.max(w / img.width, h / img.height) * zoom;
    const dw = img.width * s;
    const dh = img.height * s;
    ctx.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
  }

  function loop(t) {
    if (!running) return;

    blink(t);

    if (!interacting) {
      if (keys["w"] || keys["W"] || keys["ArrowUp"]) z += 0.02;
      if (keys["s"] || keys["S"] || keys["ArrowDown"]) z -= 0.02;
      z = Math.max(minZ, Math.min(maxZ, z));
    }

    if (z >= maxZ && scene === 1) {
      scene = 2;
      z = 1;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let bg;

    if (scene === 1) {
      bg = useLight ? images.bgLight : images.bgDark;
    } else if (scene === 2) {
      bg = useLight ? images.threeDoorsLight : images.threeDoorsDark;
      if (keys["e"] || keys["E"]) openDoor();
    } else if (scene === 3) {
      bg = images.doorOpen;
      if (keys["e"] || keys["E"]) nextScene();
    } else if (scene === 4) {
      bg = useLight ? images.ascensorLight : images.ascensorOpen;
      if (keys["e"] || keys["E"]) planta2Scene();
    } else {
      bg = images.planta2;
    }

    drawImageScaled(bg, z);
    requestAnimationFrame(loop);
  }

  function openDoor() {
    if (interacting) return;
    interacting = true;
    fade.style.opacity = 1;
    setTimeout(() => {
      fade.style.opacity = 0;
      scene = 3;
      interacting = false;
      msg.textContent = "Puerta abierta - pulsa E";
    }, 800);
  }

  function nextScene() {
    if (interacting) return;
    interacting = true;
    fade.style.opacity = 1;
    setTimeout(() => {
      fade.style.opacity = 0;
      scene = 4;
      interacting = false;
      msg.textContent = "Ascensor - Nivel 2";
    }, 800);
  }

  function planta2Scene() {
    if (interacting) return;
    interacting = true;
    fade.style.opacity = 1;
    setTimeout(() => {
      fade.style.opacity = 0;
      scene = 5;
      interacting = false;
      msg.textContent = "Planta 2 alcanzada";
    }, 1000);
  }

  startBtn.onclick = () => {
    startScreen.classList.add("fadeOut");
    running = true;
    requestAnimationFrame(loop);
  };

  document.getElementById("btnMenu").onclick = () => alert("Menú aún no implementado");
  document.getElementById("btnHelp").onclick = () => alert("Usa WASD / Flechas y E para interactuar");
  document.getElementById("btnExit").onclick = () => alert("Salir del juego próximamente");

})();
</script>

</body>
</html>
