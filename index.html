<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vharum</title>

<style>
  body {
    margin:0;
    background:black;
    overflow:hidden;
    font-family: system-ui, sans-serif;
    color:white;
  }
  #gameContainer {
    position:relative;
    width:100vw;
    height:calc(100vh - 60px);
    overflow:hidden;
  }
  canvas {
    display:block;
    width:100%;
    height:100%;
  }
  #controls {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:60px;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    border-top:1px solid rgba(255,255,255,0.1);
  }
  #controls button {
    background:white;
    color:black;
    border:none;
    border-radius:6px;
    padding:8px 16px;
    font-size:16px;
    cursor:pointer;
  }
  #msg {
    position:fixed;
    top:10px; left:10px; right:10px;
    padding:10px 12px;
    background:rgba(0,0,0,0.55);
    color:white;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.2);
    pointer-events:none;
  }
  #startScreen {
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
  }
  #startTitle {
    font-size:48px;
    margin-bottom:20px;
    letter-spacing:4px;
  }
  #startBtn {
    padding:12px 24px;
    background:white;
    color:black;
    border:none;
    border-radius:6px;
    font-size:20px;
    cursor:pointer;
  }
  #startScreen.fadeOut {
    transition: opacity 0.8s ease;
    opacity:0;
    pointer-events:none;
  }
  #fade {
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.8s ease;
  }
</style>
</head>

<body>

<div id="startScreen">
  <div id="startTitle">VHARUM — Nivel 1</div>
  <button id="startBtn">Iniciar</button>
</div>

<div id="msg">Cargando imágenes...</div>

<div id="gameContainer">
  <canvas id="c"></canvas>
</div>

<div id="controls">
  <button id="btnMenu">Menú</button>
  <button id="btnRestart">Reiniciar</button>
  <button id="btnLight">Linterna: OFF</button>
</div>

<div id="fade"></div>

<script>
(async () => {

  const FILES = {
    bgDark: "assets/planta1.png",
    bgLight: "assets/pasillooscuro.png",
    threeDoorsDark: "assets/puerta.png",
    threeDoorsLight: "assets/puertaabierta.png",
    doorOpen: "assets/habitaciontunel.png",
    ascensorOpen: "assets/salidadelahabitacion.png",
    ascensorLight: "assets/ascensorabiertoplanta2.png",
    planta2: "assets/planta2.png"
  };

  const startScreen = document.getElementById("startScreen");
  const startBtn = document.getElementById("startBtn");
  const msg = document.getElementById("msg");
  const fade = document.getElementById("fade");
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio||1));
    canvas.width = Math.floor(canvas.clientWidth * dpr);
    canvas.height = Math.floor(canvas.clientHeight * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener("resize", resize);
  resize();

  function load(url){
    return new Promise((resolve,reject)=>{
      const img=new Image();
      img.onload=()=>resolve(img);
      img.onerror=()=>reject(url);
      img.src=url;
    });
  }

  let images={};
  try{
    const entries=Object.entries(FILES);
    const loaded=await Promise.all(entries.map(([k,v])=>load(v)));
    entries.forEach(([k],i)=>images[k]=loaded[i]);
    msg.textContent="Listo — WASD / Flechas, E para interactuar, L Linterna";
  }catch(err){
    msg.textContent="❌ Error al cargar imagen: "+err;
    console.error(err);
    return;
  }

  const keys={};
  addEventListener("keydown",e=>keys[e.key]=true);
  addEventListener("keyup",e=>keys[e.key]=false);

  let x=innerWidth*0.5, y=innerHeight*0.75, speed=3;
  let z=1, maxZ=2.2, minZ=1;
  let scene=1;  
  let interacting=false, running=false;
  let flashlight=false; // linterna apagada

  // Parpadeo ambiente
  let useLight=false, nextF=performance.now()+800;
  function schedule(t){ nextF=t+(700+Math.random()*1800); }
  function blink(t){
    if(t<nextF)return;
    useLight=!useLight;
    if(useLight)nextF=t+(80+Math.random()*220);
    else schedule(t);
  }

  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  function drawImageScaled(img,zoom){
    const w=canvas.clientWidth,h=canvas.clientHeight;
    const s=Math.max(w/img.width,h/img.height)*zoom;
    const dw=img.width*s,dh=img.height*s;
    ctx.drawImage(img,(w-dw)/2,(h-dh)/2,dw,dh);
  }

  function drawFlashlight(){
    const cx=canvas.width/2, cy=canvas.height/2;
    const grad=ctx.createRadialGradient(cx,cy,50,cx,cy,350);
    grad.addColorStop(0,"rgba(255,255,255,0)");
    grad.addColorStop(1,"rgba(0,0,0,0.9)");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  function loop(t){
    if(!running)return;
    blink(t);

    if(interacting){
      requestAnimationFrame(loop);
      return;
    }

    if(keys["a"]||keys["A"]||keys["ArrowLeft"])x-=speed;
    if(keys["d"]||keys["D"]||keys["ArrowRight"])x+=speed;
    if(keys["w"]||keys["W"]||keys["ArrowUp"]){ z+=0.02; if(z>maxZ)z=maxZ; }
    if(keys["s"]||keys["S"]||keys["ArrowDown"]){ z-=0.02; if(z<minZ)z=minZ; }

    if(z>=maxZ && scene===1){ scene=2; z=1; }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let bg;
    if(scene===1){ bg=useLight?images.bgLight:images.bgDark; }
    else if(scene===2){ bg=useLight?images.threeDoorsLight:images.threeDoorsDark; if(keys["e"]||keys["E"])openDoor();}
    else if(scene===3){ bg=images.doorOpen; if(keys["e"]||keys["E"])nextScene();}
    else if(scene===4){ bg=useLight?images.ascensorLight:images.ascensorOpen; if(keys["e"]||keys["E"])planta2Scene();}
    else if(scene===5){ bg=images.planta2; }

    drawImageScaled(bg,z);

    if(flashlight) drawFlashlight(); // linterna

    requestAnimationFrame(loop);
  }

  function openDoor(){
    if(interacting)return;
    interacting=true;
    fade.style.opacity=1;
    setTimeout(()=>{
      fade.style.opacity=0;
      scene=3;
      interacting=false;
      msg.textContent="Puerta abierta — Presiona E para entrar";
    },800);
  }

  function nextScene(){
    fade.style.opacity=1;
    setTimeout(()=>{
      fade.style.opacity=0;
      scene=4;
      msg.textContent="Ascensor — Nivel 2";
    },800);
  }

  function planta2Scene(){
    fade.style.opacity=1;
    setTimeout(()=>{
      fade.style.opacity=0;
      scene=5;
      msg.textContent="Planta 2 alcanzada";
    },1000);
  }

  startBtn.onclick=()=>{
    startScreen.classList.add("fadeOut");
    running=true;
    requestAnimationFrame(loop);
  };

  // ---- BOTONES INFERIORES ----
  document.getElementById("btnLight").onclick = toggleLight;
  document.getElementById("btnRestart").onclick = ()=>restartGame();
  document.getElementById("btnMenu").onclick = ()=>previousScene();

  // teclas de acceso rápido
  addEventListener("keydown",(e)=>{
    if(e.key==="l"||e.key==="L") toggleLight();
  });

  function toggleLight(){
    flashlight=!flashlight;
    document.getElementById("btnLight").textContent = flashlight?"Linterna: ON":"Linterna: OFF";
  }
  function restartGame(){
    fade.style.opacity=1;
    setTimeout(()=>{
      fade.style.opacity=0;
      scene=1; z=1; flashlight=false;
      msg.textContent="Reiniciado — Nivel 1";
    },800);
  }
  function previousScene(){
    if(scene>1){
      fade.style.opacity=1;
      setTimeout(()=>{
        fade.style.opacity=0;
        scene--;
        z=1;
        msg.textContent="Retrocediste al nivel anterior";
      },800);
    }
  }

})();
</script>

</body>
</html>
