<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vharum</title>

<style>
  body {
    margin:0;
    background:black;
    overflow:hidden;
    font-family: system-ui, sans-serif;
  }
  canvas {
    display:block;
    width:100vw;
    height:100vh;
  }
  #msg {
    position:fixed;
    top:10px; left:10px; right:10px;
    padding:10px 12px;
    background:rgba(0,0,0,0.55);
    color:white;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.2);
    pointer-events:none;
  }
  #startScreen {
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
  }
  #startTitle {
    font-size:48px;
    margin-bottom:20px;
    letter-spacing:4px;
  }
  #startBtn {
    padding:12px 24px;
    background:white;
    color:black;
    border:none;
    border-radius:6px;
    font-size:20px;
    cursor:pointer;
  }
  #startScreen.fadeOut {
    transition: opacity 0.8s ease;
    opacity:0;
    pointer-events:none;
  }
  #fade {
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    pointer-events:none;
    transition: opacity 1s ease;
  }
</style>
</head>
<body>

<div id="startScreen">
  <div id="startTitle">VHARUM — Nivel 1</div>
  <button id="startBtn">Iniciar</button>
</div>

<div id="msg">Cargando imágenes...</div>
<canvas id="c"></canvas>
<div id="fade"></div>

<script>
(async () => {

  // RUTAS adaptadas a assets/
  const FILES = {
    bgDark: "assets/pasillo2oscuro.png",
    bgLight: "assets/pasiiloluz.png",
    threeDoorsDark: "assets/trespuertasoscuras.png",
    threeDoorsLight: "assets/trespuertasluz.png",
    doorOpen: "assets/puertaabierta.png",
    roomExit: "assets/habitacionexit.png",
    roomGrid: "assets/habitacionconrejilla.png",
    planta1: "assets/planta1.png",
    planta2: "assets/planta2.png",
    planta3: "assets/planta3.png",
    elevatorOpen: "assets/ascensorabiertoplanta2.png",
    elevatorLight: "assets/ascensorabiertoplanta2luz.png",
    elevatorClosed: "assets/ascensorcerradoplanta3.png"
  };

  const startScreen = document.getElementById("startScreen");
  const startBtn = document.getElementById("startBtn");
  const msg = document.getElementById("msg");
  const fade = document.getElementById("fade");
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio||1));
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener("resize", resize);
  resize();

  // cargar imágenes
  function load(url){
    return new Promise((res,rej)=>{
      const img=new Image();
      img.onload=()=>res(img);
      img.onerror=()=>rej(url);
      img.src=url;
    });
  }

  let images={};
  try {
    const entries=Object.entries(FILES);
    const loaded = await Promise.all(entries.map(([k,v])=>load(v)));
    entries.forEach(([k],i)=>images[k]=loaded[i]);
    msg.textContent="Listo — WASD / Flechas, E para interactuar";
  } catch(err){
    msg.textContent="❌ Error al cargar alguna imagen";
    console.error(err);
    return;
  }

  const keys={};
  addEventListener("keydown",e=>keys[e.key]=true);
  addEventListener("keyup",e=>keys[e.key]=false);

  let x=innerWidth*0.5;
  let y=innerHeight*0.75;
  const speed=3;
  let z=1;
  const maxZ=2.2;
  const minZ=1;

  // escena actual
  let scene=1; 
  // 1 pasillo, 2 puertas, 3 puerta abierta, 4 ascensor, ...

  // parpadeo
  let useLight=false;
  let nextF=performance.now()+800;
  function schedule(t){nextF=t+(700+Math.random()*1800);}
  function blink(t){
    if(t<nextF)return;
    useLight=!useLight;
    if(useLight)nextF=t+(80+Math.random()*220);
    else schedule(t);
  }

  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

  let running=false;
  let interacting=false;

  function drawImageScaled(img,zoom){
    const w=innerWidth,h=innerHeight;
    const s=Math.max(w/img.width,h/img.height)*zoom;
    const dw=img.width*s,dh=img.height*s;
    ctx.drawImage(img,(w-dw)/2,(h-dh)/2,dw,dh);
  }

  function loop(t){
    if(!running)return;
    blink(t);
    if(interacting){
      drawImageScaled(images.doorOpen,1);
      requestAnimationFrame(loop);
      return;
    }

    if(keys["a"]||keys["A"]||keys["ArrowLeft"])  x-=speed;
    if(keys["d"]||keys["D"]||keys["ArrowRight"]) x+=speed;
    if(keys["w"]||keys["W"]||keys["ArrowUp"]) {
      z+=0.02; if(z>maxZ) z=maxZ;
    }
    if(keys["s"]||keys["S"]||keys["ArrowDown"]) {
      z-=0.02; if(z<minZ) z=minZ;
    }

    if(z>=maxZ && scene===1){
      scene=2; z=1;
    }

    x=clamp(x,innerWidth*0.05,innerWidth*0.95);

    ctx.clearRect(0,0,innerWidth,innerHeight);

    let bg;
    if(scene===1){
      bg = useLight?images.bgLight:images.bgDark;
    } else if(scene===2){
      bg = useLight?images.threeDoorsLight:images.threeDoorsDark;
      if(keys["e"]||keys["E"]) openDoor();
    } else if(scene===3){
      bg = images.doorOpen;
      if(keys["e"]||keys["E"]) nextScene();
    } else if(scene===4){
      bg = useLight?images.elevatorLight:images.elevatorOpen;
    } else {
      bg = images.bgDark;
    }

    drawImageScaled(bg,z);
    requestAnimationFrame(loop);
  }

  function openDoor(){
    if(interacting)return;
    interacting=true;
    fade.style.opacity=1;
    setTimeout(()=>{
      fade.style.opacity=0;
      scene=3;
      interacting=false;
      msg.textContent="Puerta abierta — Presiona E para entrar";
    },1000);
  }
  function nextScene(){
    fade.style.opacity=1;
    setTimeout(()=>{
      fade.style.opacity=0;
      scene=4; // siguiente zona (ascensor, planta2, etc.)
      msg.textContent="Ascensor ▶ Nivel 2";
    },1000);
  }

  startBtn.onclick=()=>{
    startScreen.classList.add("fadeOut");
    running=true;
    requestAnimationFrame(loop);
  };

})();
</script>

</body>
</html>
